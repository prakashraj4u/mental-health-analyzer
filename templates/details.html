<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindCare — Your Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #1e1b4b, #4f46e5, #7c3aed); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 30px 20px; }
        .card { background: rgba(255,255,255,0.97); border-radius: 24px; padding: 44px 40px; max-width: 520px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .top { text-align: center; margin-bottom: 32px; }
        .top .icon { font-size: 48px; margin-bottom: 12px; }
        .top h2 { font-size: 24px; font-weight: 700; color: #1e1b4b; margin-bottom: 6px; }
        .top p { font-size: 13px; color: #6b7280; line-height: 1.6; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 13px 16px; border: 1.5px solid #e5e7eb; border-radius: 12px; font-size: 14px; font-family: 'Poppins', sans-serif; color: #1f2937; outline: none; transition: border 0.2s, box-shadow 0.2s; }
        .form-group input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
        .form-group input::placeholder { color: #9ca3af; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .required { color: #ef4444; margin-left: 2px; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Poppins', sans-serif; margin-top: 8px; transition: all 0.2s; box-shadow: 0 4px 16px rgba(79,70,229,0.35); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,70,229,0.45); }
        .note { font-size: 11px; color: #9ca3af; text-align: center; margin-top: 14px; line-height: 1.6; }
        .progress { display: flex; gap: 8px; margin-bottom: 28px; }
        .step { flex: 1; height: 5px; border-radius: 3px; background: #e5e7eb; }
        .step.active { background: #4f46e5; }
    </style>
</head>
<body>
    <div class="card">
        <div class="progress">
            <div class="step active"></div>
            <div class="step"></div>
            <div class="step"></div>
            <div class="step"></div>
            <div class="step"></div>
        </div>

        <div class="top">
            <div class="icon">📋</div>
            <h2>Before We Begin</h2>
            <p>Please fill in your details so we can personalize your experience and keep a record of your assessment.</p>
        </div>

        <form action="/save_details" method="POST">
            <div class="row">
                <div class="form-group">
                    <label>Full Name <span class="required">*</span></label>
                    <input type="text" name="name" placeholder="Prakash Raj" required>
                </div>
                <div class="form-group">
                    <label>Date of Birth <span class="required">*</span></label>
                    <input type="date" name="dob" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address <span class="required">*</span></label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label>Phone Number <span class="required">*</span></label>
                <input type="tel" name="phone" placeholder="+91 98765 43210" required>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>City</label>
                    <input type="text" name="city" placeholder="Lucknow">
                </div>
                <div class="form-group">
                    <label>Today's Date</label>
                    <input type="date" name="date" value="">
                </div>
            </div>

            <button type="submit" class="btn">Continue to Doctor Selection →</button>
        </form>

        <p class="note">🔒 Your information is completely private and confidential.<br>We never share your data with anyone.</p>
    </div>
</body>
</html>
